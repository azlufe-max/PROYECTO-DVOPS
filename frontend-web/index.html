<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Guest-Pass – Sistema de Registro de Visitantes. Registra y consulta el ingreso de visitantes en tiempo real." />
  <title>Guest-Pass | Registro de Visitantes</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🪪</span>
        <span class="logo-text">Guest<strong>Pass</strong></span>
      </div>
      <div class="header-badge">
        <span id="status-dot" class="dot dot--checking"></span>
        <span id="status-label">Conectando…</span>
      </div>
    </div>
  </header>

  <!-- ── MAIN ───────────────────────────────────────────────── -->
  <main class="container">

    <!-- FORM CARD -->
    <section class="card" id="registro-section">
      <div class="card-header">
        <h1>Registrar Visitante</h1>
        <p class="subtitle">Completa los datos para registrar el ingreso.</p>
      </div>

      <form id="checkin-form" novalidate>
        <div class="form-grid">

          <div class="field">
            <label for="nombre">Nombre completo <span class="required">*</span></label>
            <input id="nombre" name="nombre" type="text" placeholder="Ej. Ana García" maxlength="100" required />
            <span class="field-error" id="err-nombre"></span>
          </div>

          <div class="field">
            <label for="empresa">Empresa / Institución</label>
            <input id="empresa" name="empresa" type="text" placeholder="Ej. ACME S.A. (opcional)" maxlength="100" />
          </div>

          <div class="field field--full">
            <label for="motivo">Motivo de visita</label>
            <textarea id="motivo" name="motivo" rows="3" placeholder="Ej. Reunión con Recursos Humanos (opcional)"></textarea>
          </div>

        </div><!-- /form-grid -->

        <!-- Origen es siempre "web" desde esta interfaz -->
        <input type="hidden" id="origen" value="web" />

        <div class="form-footer">
          <button id="submit-btn" type="submit" class="btn btn--primary">
            <span class="btn-text">Registrar Ingreso</span>
            <span class="btn-spinner hidden" aria-hidden="true"></span>
          </button>
        </div>
      </form>

      <!-- Toast de éxito / error -->
      <div id="toast" class="toast hidden" role="alert" aria-live="polite"></div>
    </section>

    <!-- TABLE CARD -->
    <section class="card" id="listado-section">
      <div class="card-header card-header--row">
        <div>
          <h2>Visitantes Registrados</h2>
          <p class="subtitle" id="record-count">Cargando registros…</p>
        </div>
        <button id="refresh-btn" class="btn btn--ghost" aria-label="Actualizar listado">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
            <path fill-rule="evenodd" d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
            <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
          </svg>
          Actualizar
        </button>
      </div>

      <div class="table-wrapper">
        <table id="records-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Empresa</th>
              <th>Motivo</th>
              <th>Origen</th>
              <th>Fecha de Registro</th>
            </tr>
          </thead>
          <tbody id="records-body">
            <tr class="empty-row">
              <td colspan="6">
                <div class="empty-state">
                  <span class="empty-icon">📋</span>
                  <p>Cargando registros…</p>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- ── FOOTER ─────────────────────────────────────────────── -->
  <footer class="site-footer">
    <p>Guest-Pass v1.0 · API: <a href="http://localhost:8000/docs" target="_blank" rel="noopener">localhost:8000</a></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
